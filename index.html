<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProntoCrono- Resultados Ao Vivo</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #eef3f7;
      --panel: #ffffff;
      --panel-muted: #f7f9fb;
      --ink: #1f2933;
      --ink-soft: #52606d;
      --line: #d9e2ec;
      --brand: #2c3e50;
      --brand-strong: #20262d;
      --accent: #d35400;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(44, 62, 80, 0.08), transparent 30%),
        linear-gradient(180deg, #f7fafc 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .page-shell {
      width: min(1320px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 40px;
    }

    .hero {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent 45%),
        linear-gradient(135deg, #334a62 0%, var(--brand) 55%, #243447 100%);
      color: #fff;
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.05;
      font-weight: 300;
      letter-spacing: -0.03em;
    }

    .hero-logo {
      display: block;
      width: clamp(70px, 9vw, 120px);
      height: auto;
      margin: 0 auto 10px;
      object-fit: contain;
    }

    .hero p {
      margin: 0;
    }

    .hero-event {
      margin-top: 10px;
      font-size: clamp(1rem, 2vw, 1.35rem);
      color: rgba(255, 255, 255, 0.9);
    }

    .hero-update {
      margin-top: 22px;
      font-size: 0.98rem;
      color: rgba(255, 255, 255, 0.82);
    }

    .toolbar {
      margin-top: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(217, 226, 236, 0.95);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-copy {
      min-width: 180px;
    }

    .toolbar-copy strong {
      display: block;
      font-size: 1rem;
    }

    .toolbar-copy span {
      color: var(--ink-soft);
      font-size: 0.92rem;
    }

    .search-wrap {
      flex: 1 1 380px;
      position: relative;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-muted);
      padding: 14px 18px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .search-input:focus {
      border-color: #7ba3cc;
      box-shadow: 0 0 0 4px rgba(123, 163, 204, 0.18);
      background: #fff;
    }

    .result-count {
      margin-top: 14px;
      color: var(--ink-soft);
      font-size: 0.92rem;
      min-height: 1.4em;
    }

    .results-grid {
      margin-top: 18px;
      display: grid;
      gap: 18px;
    }

    .percurso-section {
      display: grid;
      gap: 12px;
    }

    .percurso-title {
      background: #1f2937;
      color: #fff;
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: var(--shadow);
    }

    .categoria-card {
      background: var(--panel);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(217, 226, 236, 0.9);
    }

    .categoria-header {
      background: var(--brand-strong);
      color: #fff;
      padding: 14px 18px;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .desktop-table-wrap {
      overflow-x: auto;
    }

    .resultado-table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .resultado-table thead th {
      padding: 13px 14px;
      background: #f6f8fb;
      color: var(--ink);
      border-bottom: 1px solid var(--line);
      font-size: 0.94rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .resultado-table tbody td {
      padding: 13px 14px;
      border-bottom: 1px solid #edf2f7;
      font-size: 0.98rem;
      color: var(--ink);
      vertical-align: middle;
    }

    .resultado-table tbody tr:nth-child(even) {
      background: #fbfcfe;
    }

    .col-pos,
    .col-num {
      width: 74px;
      text-align: center;
    }

    .col-pos {
      color: var(--accent);
      font-weight: 700;
    }

    .col-num {
      font-weight: 600;
    }

    .col-nome {
      width: 220px;
      text-align: left;
    }

    .col-equipe {
      width: 300px;
      text-align: left;
    }

    .col-tempo {
      width: 180px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .col-stage {
      width: 170px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .col-voltas {
      width: 100px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    .mobile-list {
      display: none;
      padding: 14px;
      background: #fcfdff;
    }

    .mobile-athlete {
      background: #fff;
      border: 1px solid #e8eef5;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
    }

    .mobile-athlete + .mobile-athlete {
      margin-top: 12px;
    }

    .mobile-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mobile-pos {
      color: var(--accent);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .mobile-num {
      color: var(--ink-soft);
      font-size: 0.92rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .mobile-name {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .mobile-team {
      color: var(--ink-soft);
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .mobile-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--panel-muted);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 68px;
    }

    .metric-label {
      display: block;
      color: var(--ink-soft);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .metric-value {
      display: block;
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--ink);
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }

    .stage-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .stage-item {
      background: var(--panel-muted);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 68px;
    }

    .stage-item strong {
      display: block;
      color: var(--ink-soft);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .empty-state {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(217, 226, 236, 0.92);
      border-radius: 18px;
      padding: 26px 20px;
      text-align: center;
      box-shadow: var(--shadow);
      color: var(--ink-soft);
    }

    @media (max-width: 991px) {
      .page-shell {
        width: min(100% - 16px, 100%);
        padding-top: 8px;
      }

      .hero {
        border-radius: 20px;
        padding: 22px 18px;
      }

      .toolbar {
        padding: 14px;
      }

      .desktop-table-wrap {
        display: none;
      }

      .mobile-list {
        display: block;
      }
    }

    @media (max-width: 575px) {
      .hero h1 {
        font-size: 2.1rem;
      }

      .hero-event {
        font-size: 1.06rem;
      }

      .toolbar-copy strong {
        font-size: 0.98rem;
      }

      .search-input {
        font-size: 0.97rem;
      }

      .mobile-metrics {
        grid-template-columns: 1fr;
      }

      .categoria-header {
        font-size: 0.98rem;
        padding: 13px 15px;
      }

      .percurso-title {
        font-size: 0.94rem;
      }

      .mobile-athlete {
        padding: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <img src="./logo.png" alt="Logo do evento" class="hero-logo">
      <h1>Resultados</h1>
      <p id="nome-evento" class="hero-event">Carregando evento...</p>
      <p class="hero-update">Ultima atualizacao: <span id="hora-update">--:--:--</span></p>
    </header>

    <section class="toolbar">
      <div class="toolbar-copy">
        <strong>Busca rapida</strong>
        <span>Encontre atleta por nome ou numero.</span>
      </div>

      <div class="search-wrap">
        <input
          id="busca-atleta"
          class="search-input"
          type="search"
          inputmode="search"
          placeholder=""
          autocomplete="off"
        >
      </div>
    </section>

    <div id="resultado-contador" class="result-count"></div>

    <main id="lista-resultados" class="results-grid">
      <div class="empty-state">Aguardando dados do cronometro...</div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://pronto-resultados-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const resultadosRef = ref(db, "prova/atual");

    const state = {
      evento: "Pronto Resultados",
      atualizacao: "--:--:--",
      categorias: [],
      busca: ""
    };

    const listaResultados = document.getElementById("lista-resultados");
    const campoBusca = document.getElementById("busca-atleta");
    const contadorResultados = document.getElementById("resultado-contador");

    campoBusca.addEventListener("input", (event) => {
      state.busca = normalizar(event.target.value);
      render();
    });

    onValue(resultadosRef, (snapshot) => {
      const data = snapshot.val();

      if (!data) {
        state.evento = "Pronto Resultados";
        state.atualizacao = "--:--:--";
        state.categorias = [];
        atualizarCabecalho();
        render();
        return;
      }

      state.evento = data.evento || "pronto Resultados";
      state.atualizacao = data.ultima_atualizacao || "--:--:--";
      state.categorias = normalizarCategorias(data.resultados);

      atualizarCabecalho();
      render();
    }, (error) => {
      listaResultados.innerHTML =
        `<div class="empty-state">Erro ao ler Firebase: ${escapeHtml(error.message || "Falha desconhecida")}</div>`;
      contadorResultados.textContent = "";
    });

    function atualizarCabecalho() {
      document.getElementById("nome-evento").textContent = state.evento;
      document.getElementById("hora-update").textContent = state.atualizacao;
    }

    function render() {
      const buscaAtiva = state.busca.length > 0;
      const categoriasFiltradas = filtrarCategorias(state.categorias, state.busca);
      const gruposPorPercurso = agruparPorPercurso(categoriasFiltradas);
      const totalAtletas = contarAtletas(categoriasFiltradas);
      const totalCategorias = categoriasFiltradas.length;
      const totalPercursos = gruposPorPercurso.length;

      contadorResultados.textContent = montarResumoResultados(
        buscaAtiva,
        totalAtletas,
        totalCategorias,
        totalPercursos
      );

      if (!state.categorias.length) {
        listaResultados.innerHTML = '<div class="empty-state">Aguardando dados do cronometro...</div>';
        return;
      }

      if (!gruposPorPercurso.length) {
        listaResultados.innerHTML = '<div class="empty-state">Nenhum atleta encontrado para esta busca.</div>';
        return;
      }

      listaResultados.innerHTML = gruposPorPercurso.map(renderizarGrupoPercurso).join("");
    }

    function filtrarCategorias(categorias, busca) {
      return (categorias || [])
        .map((categoria) => {
          const atletas = Array.isArray(categoria.atletas) ? categoria.atletas : [];
          const atletasFiltrados = busca
            ? atletas.filter((atleta) => atletaCombinaBusca(atleta, busca))
            : atletas;

          return {
            ...categoria,
            atletas: atletasFiltrados
          };
        })
        .filter((categoria) => categoria.atletas.length > 0);
    }

    function atletaCombinaBusca(atleta, busca) {
      const alvo = [
        atleta?.nome,
        atleta?.num,
        atleta?.equipe,
        atleta?.modalidade,
        atleta?.percurso,
        atleta?.faixa,
        atleta?.etapa_atual
      ]
        .map((valor) => normalizar(valor))
        .join(" ");

      return alvo.includes(busca);
    }

    function montarResumoResultados(buscaAtiva, totalAtletas, totalCategorias, totalPercursos) {
      if (!state.categorias.length) {
        return "";
      }

      if (!buscaAtiva) {
        return `${totalPercursos} percurso(s), ${totalCategorias} categorias exibidas em tempo real.`;
      }

      if (totalAtletas === 0) {
        return "Busca ativa sem resultados.";
      }

      return `${totalAtletas} atleta(s) encontrado(s) em ${totalCategorias} categoria(s) de ${totalPercursos} percurso(s).`;
    }

    function contarAtletas(categorias) {
      return (categorias || []).reduce((total, categoria) => {
        return total + ((categoria.atletas || []).length);
      }, 0);
    }

    function agruparPorPercurso(categorias) {
      const grupos = [];
      const indices = new Map();

      for (const categoria of categorias || []) {
        const percurso = textoSeguro(categoria.percurso).trim() || "Percurso nao informado";

        if (!indices.has(percurso)) {
          indices.set(percurso, grupos.length);
          grupos.push({ percurso, categorias: [] });
        }

        grupos[indices.get(percurso)].categorias.push(categoria);
      }

      return grupos;
    }

    function renderizarGrupoPercurso(grupo) {
      return `
        <section class="percurso-section">
          <div class="percurso-title">Percurso: ${escapeHtml(textoSeguro(grupo.percurso))}</div>
          ${grupo.categorias.map(renderizarCategoria).join("")}
        </section>
      `;
    }

    function renderizarCategoria(categoria) {
      const titulo = escapeHtml(textoSeguro(categoria.titulo));
      const atletas = Array.isArray(categoria.atletas) ? categoria.atletas : [];
      const etapas = obterEtapasCategoria(categoria, atletas);

      return `
        <section class="categoria-card">
          <div class="categoria-header">${titulo}</div>

          <div class="desktop-table-wrap">
            <table class="resultado-table">
              <thead>
                <tr>
                  <th class="col-pos">Pos</th>
                  <th class="col-num">Numero</th>
                  <th class="col-nome">Nome</th>
                  <th class="col-equipe">Equipe</th>
                  ${etapas.map((etapa) => `<th class="col-stage">${escapeHtml(etapa)}</th>`).join("")}
                  <th class="col-tempo">Tempo</th>
                </tr>
              </thead>
              <tbody>
                ${atletas.map((atleta) => renderizarLinhaDesktop(atleta, etapas)).join("")}
              </tbody>
            </table>
          </div>

          <div class="mobile-list">
            ${atletas.map((atleta) => renderizarCardMobile(atleta, etapas)).join("")}
          </div>
        </section>
      `;
    }

    function obterEtapasCategoria(categoria, atletas) {
      const etapasExplicitas = Array.isArray(categoria?.colunas_etapas) ? categoria.colunas_etapas : [];
      if (etapasExplicitas.length > 0) {
        return etapasExplicitas.map((etapa) => textoSeguro(etapa).trim()).filter(Boolean);
      }

      return coletarEtapasParciais(atletas);
    }

    function normalizarCategorias(categorias) {
      return (Array.isArray(categorias) ? categorias : []).map((categoria) => {
        const percurso = resolverPercursoCategoria(categoria);
        const tituloOriginal = textoSeguro(categoria?.titulo);

        return {
          ...categoria,
          percurso,
          titulo: removerPercursoDoTitulo(tituloOriginal, percurso)
        };
      });
    }

    function resolverPercursoCategoria(categoria) {
      const percursoExplicito = textoSeguro(categoria?.percurso).trim();
      if (percursoExplicito) return percursoExplicito;

      const titulo = textoSeguro(categoria?.titulo).trim();
      const idx = titulo.lastIndexOf(" - ");
      if (idx > 0) {
        const sufixo = titulo.slice(idx + 3).trim();
        if (sufixo) return sufixo;
      }

      const atletas = Array.isArray(categoria?.atletas) ? categoria.atletas : [];
      const contagem = new Map();
      for (const atleta of atletas) {
        const percursoAtleta = textoSeguro(atleta?.percurso).trim();
        if (!percursoAtleta) continue;
        contagem.set(percursoAtleta, (contagem.get(percursoAtleta) || 0) + 1);
      }

      let maisFrequente = "";
      let maiorQuantidade = 0;
      for (const [percurso, quantidade] of contagem.entries()) {
        if (quantidade > maiorQuantidade) {
          maiorQuantidade = quantidade;
          maisFrequente = percurso;
        }
      }

      return maisFrequente || "Percurso nao informado";
    }

    function removerPercursoDoTitulo(titulo, percurso) {
      const tituloSeguro = textoSeguro(titulo).trim();
      const percursoSeguro = textoSeguro(percurso).trim();
      if (!tituloSeguro || !percursoSeguro) return tituloSeguro;

      const sufixo = ` - ${percursoSeguro}`;
      if (tituloSeguro.toLowerCase().endsWith(sufixo.toLowerCase())) {
        return tituloSeguro.slice(0, -sufixo.length).trim();
      }

      return tituloSeguro;
    }

    function renderizarLinhaDesktop(atleta, etapas) {
      const mapa = obterMapaParciais(atleta);

      return `
        <tr>
          <td class="col-pos">${escapeHtml(textoSeguro(atleta.pos))}</td>
          <td class="col-num">${escapeHtml(textoSeguro(atleta.num))}</td>
          <td class="col-nome">${escapeHtml(textoSeguro(atleta.nome))}</td>
          <td class="col-equipe">${escapeHtml(textoSeguro(atleta.equipe))}</td>
          ${etapas.map((etapa) => `<td class="col-stage">${escapeHtml(textoSeguro(mapa.get(etapa) || ""))}</td>`).join("")}
          <td class="col-tempo">${escapeHtml(textoSeguro(atleta.tempo))}</td>
        </tr>
      `;
    }

    function coletarEtapasParciais(atletas) {
      const etapas = [];
      const vistos = new Set();

      for (const atleta of atletas || []) {
        const mapa = obterMapaParciais(atleta);
        for (const etapa of mapa.keys()) {
          const chave = normalizar(etapa);
          if (chave && !vistos.has(chave)) {
            vistos.add(chave);
            etapas.push(etapa);
          }
        }
      }

      return etapas;
    }

    function obterMapaParciais(atleta) {
      const mapa = new Map();
      const lista = Array.isArray(atleta?.parciais) ? atleta.parciais : [];

      for (const parcial of lista) {
        const etapa = textoSeguro(parcial?.etapa).trim();
        if (!etapa || mapa.has(etapa)) continue;
        mapa.set(etapa, textoSeguro(parcial?.tempo).trim());
      }

      const etapaAtual = textoSeguro(atleta?.etapa_atual).trim();
      const parcialAtual = textoSeguro(atleta?.parcial_atual).trim();
      if (etapaAtual && !mapa.has(etapaAtual)) {
        mapa.set(etapaAtual, parcialAtual);
      }

      return mapa;
    }

    function renderizarCardMobile(atleta, etapas) {
      const mapa = obterMapaParciais(atleta);

      return `
        <article class="mobile-athlete">
          <div class="mobile-topline">
            <span class="mobile-pos">${escapeHtml(textoSeguro(atleta.pos))}</span>
            <span class="mobile-num">Numero ${escapeHtml(textoSeguro(atleta.num))}</span>
          </div>

          <div class="mobile-name">${escapeHtml(textoSeguro(atleta.nome))}</div>
          <div class="mobile-team">${escapeHtml(textoSeguro(atleta.equipe))}</div>

          <div class="mobile-metrics">
            <div class="metric">
              <span class="metric-label">Tempo</span>
              <span class="metric-value">${escapeHtml(textoSeguro(atleta.tempo))}</span>
            </div>
          </div>

          <div class="stage-list">
            ${etapas.map((etapa) => `
              <div class="stage-item">
                <strong>${escapeHtml(etapa)}</strong>
                <span>${escapeHtml(textoSeguro(mapa.get(etapa) || ""))}</span>
              </div>
            `).join("")}
          </div>
        </article>
      `;
    }

    function textoSeguro(valor) {
      return valor == null ? "" : String(valor);
    }

    function normalizar(valor) {
      return textoSeguro(valor)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function escapeHtml(valor) {
      return textoSeguro(valor)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
